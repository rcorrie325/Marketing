<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Minimal Tetris</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #1b263b, #0d1b2a 70%);
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    main {
      display: grid;
      gap: 1rem;
      padding: 2rem;
      background: rgba(10, 15, 30, 0.85);
      border-radius: 1rem;
      box-shadow: 0 1rem 2.5rem rgba(0, 0, 0, 0.6);
      text-align: center;
    }

    canvas {
      border-radius: 0.5rem;
      background: #0b1320;
      box-shadow: inset 0 0 1rem rgba(0, 0, 0, 0.7);
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      font-size: 0.95rem;
      opacity: 0.85;
    }

    .footer {
      font-size: 0.85rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <main>
    <div>
      <h1>Play Tetris</h1>
      <p>Use arrow keys for movement, <strong>Space</strong> to hard drop.</p>
    </div>
    <canvas id="board" width="300" height="600"></canvas>
    <div class="meta">
      <span>Level: <strong id="level">1</strong></span>
      <span>Score: <strong id="score">0</strong></span>
      <span>Lines: <strong id="lines">0</strong></span>
    </div>
    <p class="footer">Reload page to restart.</p>
  </main>

  <script>
    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const linesEl = document.getElementById('lines');
    const levelEl = document.getElementById('level');

    const COLS = 10;
    const ROWS = 20;
    const BLOCK = 30;
    const COLORS = {
      0: '#111720',
      I: '#5DD2FF',
      J: '#4975FF',
      L: '#FF9F1C',
      O: '#F7E733',
      S: '#79FF7A',
      T: '#C77DFF',
      Z: '#FF6B6B',
    };

    const SHAPES = {
      Z: [
        [0, 'Z', 'Z'],
        ['Z', 'Z', 0],
        [0, 0, 0],
      ],
      S: [
        ['S', 'S', 0],
        [0, 'S', 'S'],
        [0, 0, 0],
      ],
      T: [
        [0, 'T', 0],
        ['T', 'T', 'T'],
        [0, 0, 0],
      ],
      O: [
        ['O', 'O'],
        ['O', 'O'],
      ],
      L: [
        [0, 0, 'L'],
        ['L', 'L', 'L'],
        [0, 0, 0],
      ],
      J: [
        ['J', 0, 0],
        ['J', 'J', 'J'],
        [0, 0, 0],
      ],
      I: [
        [0, 0, 0, 0],
        ['I', 'I', 'I', 'I'],
        [0, 0, 0, 0],
        [0, 0, 0, 0],
      ],
    };

    const bag = [];

    function getRandomPieceFromBag() {
      if (!bag.length) {
        bag.push(...Object.keys(SHAPES));
        for (let i = bag.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [bag[i], bag[j]] = [bag[j], bag[i]];
        }
      }
      return bag.pop();
    }

    function createMatrix(cols, rows) {
      return Array.from({ length: rows }, () => Array(cols).fill(0));
    }

    function drawMatrix(matrix, offset) {
      matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (!value) return;
          ctx.fillStyle = COLORS[value];
          ctx.fillRect((x + offset.x) * BLOCK, (y + offset.y) * BLOCK, BLOCK - 1, BLOCK - 1);
          ctx.fillStyle = '#ffffff12';
          ctx.fillRect((x + offset.x) * BLOCK + 4, (y + offset.y) * BLOCK + 4, BLOCK - 9, BLOCK - 9);
        });
      });
    }

    function collide(board, piece) {
      const { shape, pos } = piece;
      for (let y = 0; y < shape.length; y += 1) {
        for (let x = 0; x < shape[y].length; x += 1) {
          if (!shape[y][x]) continue;
          const newY = y + pos.y;
          const newX = x + pos.x;
          if (newX < 0 || newX >= COLS || newY >= ROWS) return true;
          if (newY >= 0 && board[newY][newX]) return true;
        }
      }
      return false;
    }

    function merge(board, piece) {
      piece.shape.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value && piece.pos.y + y >= 0) {
            board[piece.pos.y + y][piece.pos.x + x] = value;
          }
        });
      });
    }

    function rotate(matrix, dir) {
      const result = matrix.map((row, y) => row.map((_, x) => matrix[matrix.length - 1 - x][y]));
      return dir > 0 ? result : result.map(row => row.reverse()).reverse();
    }

    function sweep() {
      let cleared = 0;
      outer: for (let y = ROWS - 1; y >= 0; y -= 1) {
        for (let x = 0; x < COLS; x += 1) {
          if (!board[y][x]) {
            continue outer;
          }
        }
        const row = board.splice(y, 1)[0].fill(0);
        board.unshift(row);
        cleared += 1;
        y += 1;
      }
      if (cleared) {
        lines += cleared;
        score += cleared * 100 * level;
        if (lines >= level * 10) {
          level += 1;
          dropInterval = Math.max(120, dropInterval * 0.85);
        }
        updateMeta();
      }
    }

    function newPiece() {
      const type = getRandomPieceFromBag();
      return {
        shape: SHAPES[type].map(row => [...row]),
        pos: { x: Math.floor(COLS / 2) - 2, y: -2 },
      };
    }

    function playerDrop() {
      current.pos.y += 1;
      if (collide(board, current)) {
        current.pos.y -= 1;
        merge(board, current);
        sweep();
        current = newPiece();
        if (collide(board, current)) {
          board.forEach(row => row.fill(0));
          score = 0;
          lines = 0;
          level = 1;
          dropInterval = 800;
          updateMeta();
        }
      }
      dropCounter = 0;
    }

    function hardDrop() {
      while (!collide(board, { shape: current.shape, pos: { x: current.pos.x, y: current.pos.y + 1 } })) {
        current.pos.y += 1;
      }
      playerDrop();
    }

    function playerMove(dir) {
      current.pos.x += dir;
      if (collide(board, current)) {
        current.pos.x -= dir;
      }
    }

    function playerRotate(dir) {
      const rotated = rotate(current.shape, dir);
      const originalX = current.pos.x;
      let offset = 0;
      while (collide(board, { shape: rotated, pos: current.pos })) {
        offset = offset ? -(offset + (offset > 0 ? 1 : -1)) : 1;
        current.pos.x += offset;
        if (Math.abs(offset) > current.shape[0].length) {
          current.pos.x = originalX;
          return;
        }
      }
      current.shape = rotated;
    }

    function updateMeta() {
      scoreEl.textContent = score;
      linesEl.textContent = lines;
      levelEl.textContent = level;
    }

    function drawGrid() {
      ctx.strokeStyle = '#ffffff0f';
      ctx.lineWidth = 1;
      for (let x = 0; x <= COLS; x += 1) {
        ctx.beginPath();
        ctx.moveTo(x * BLOCK, 0);
        ctx.lineTo(x * BLOCK, ROWS * BLOCK);
        ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y += 1) {
        ctx.beginPath();
        ctx.moveTo(0, y * BLOCK);
        ctx.lineTo(COLS * BLOCK, y * BLOCK);
        ctx.stroke();
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawGrid();
      drawMatrix(board, { x: 0, y: 0 });
      drawMatrix(current.shape, current.pos);
    }

    let board = createMatrix(COLS, ROWS);
    let current = newPiece();
    let lastTime = 0;
    let dropCounter = 0;
    let dropInterval = 800;
    let score = 0;
    let lines = 0;
    let level = 1;

    document.addEventListener('keydown', (event) => {
      switch (event.code) {
        case 'ArrowLeft':
          playerMove(-1);
          break;
        case 'ArrowRight':
          playerMove(1);
          break;
        case 'ArrowDown':
          playerDrop();
          break;
        case 'ArrowUp':
          playerRotate(1);
          break;
        case 'Space':
          hardDrop();
          break;
        default:
          return;
      }
      event.preventDefault();
    });

    function update(time = 0) {
      const delta = time - lastTime;
      lastTime = time;
      dropCounter += delta;
      if (dropCounter > dropInterval) {
        playerDrop();
      }
      draw();
      requestAnimationFrame(update);
    }

    updateMeta();
    update();
  </script>
</body>
</html>
